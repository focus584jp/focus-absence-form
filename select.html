<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>教室を選択</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #F2F4F7;
      padding: 16px;
      color: #333333;
    }
    h1 { font-size: 18px; color: #143778; margin-bottom: 16px; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 15px; white-space: pre-line; }
    .message.error { background: #fdecea; color: #c62828; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .room-btn {
      padding: 16px 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      color: #555555;
      font-weight: bold;
      cursor: pointer;
    }
    .room-btn:active { background: #DDE7F7; border-color: #143778; }
    .room-btn:disabled { opacity: .5; }
  </style>
</head>
<body>
  <div id="message"></div>
  <h1>在籍している教室を選択してください</h1>
  <div class="grid" id="grid"></div>

  <script>
    // ===== 設定 =====
    const LIFF_ID = '2010272855-LUwv7nxh';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbywAFTtPxH5dU4TVnBvXhbjQy10z7cqwWUS4P7q9bg6crE_v8Sfmz117cYfIWRtb7Cpgw/exec';
    // ================

    let userId = null;
    let submitting = false;

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.className = 'message ' + type;
      el.textContent = text;
    }

    // GASから教室一覧を取得（JSONP。別オリジンのためscriptタグで読む）
    function fetchClassrooms() {
      return new Promise(function (resolve) {
        const cb = 'jsonp_' + Date.now();
        const script = document.createElement('script');
        const timer = setTimeout(function () { cleanup(); resolve([]); }, 8000);
        function cleanup() {
          clearTimeout(timer);
          delete window[cb];
          if (script.parentNode) script.parentNode.removeChild(script);
        }
        window[cb] = function (data) {
          cleanup();
          resolve(data && data.classrooms ? data.classrooms : []);
        };
        script.onerror = function () { cleanup(); resolve([]); };
        script.src = GAS_URL + '?action=getClassrooms&callback=' + cb;
        document.body.appendChild(script);
      });
    }

    function renderButtons(classrooms) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      classrooms.forEach(function (name) {
        const btn = document.createElement('button');
        btn.className = 'room-btn';
        btn.textContent = name;
        btn.addEventListener('click', function () { register(name, btn); });
        grid.appendChild(btn);
      });
    }

    async function register(classroom, btn) {
      if (submitting) return;
      if (!userId) {
        showMessage('ユーザー情報を取得できませんでした。一度閉じて開き直してください。', 'error');
        return;
      }
      submitting = true;
      Array.prototype.forEach.call(document.querySelectorAll('.room-btn'), function (b) { b.disabled = true; });
      btn.textContent = classroom + '（登録中…）';

      try {
        // GASは別オリジンのためCORSでレスポンスを読めない。no-corsで送信し、
        // 確認はGASからのLINEプッシュメッセージで通知される。
        await fetch(GAS_URL + '?action=register_classroom', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ userId: userId, classroom: classroom }),
        });
        if (liff.isInClient()) {
          liff.closeWindow();
        } else {
          showMessage(classroom + '教室で登録しました。', 'error');
        }
      } catch (err) {
        showMessage('登録に失敗しました: ' + err.message, 'error');
        submitting = false;
        Array.prototype.forEach.call(document.querySelectorAll('.room-btn'), function (b) { b.disabled = false; });
        btn.textContent = classroom;
      }
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
      } catch (err) {
        showMessage('LIFFの初期化に失敗しました: ' + err.message, 'error');
        return;
      }
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      try {
        const profile = await liff.getProfile();
        userId = profile.userId;
      } catch (err) {
        showMessage('ユーザー情報の取得に失敗しました: ' + err.message, 'error');
        return;
      }
      const classrooms = await fetchClassrooms();
      if (classrooms.length === 0) {
        showMessage('教室一覧を取得できませんでした。一度閉じて開き直してください。', 'error');
        return;
      }
      renderButtons(classrooms);
    }

    main();
  </script>
</body>
</html>
