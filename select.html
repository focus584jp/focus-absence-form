<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>教室を選択</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #F2F4F7;
      padding: 16px;
      color: #333333;
    }
    h1 { font-size: 18px; color: #143778; margin-bottom: 16px; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 15px; white-space: pre-line; }
    .message.error { background: #fdecea; color: #c62828; }
    /* 見出しとボタンを同時に表示するため、ボタン描画までは隠しておく */
    #picker { visibility: hidden; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .room-btn {
      padding: 16px 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      color: #555555;
      font-weight: bold;
      cursor: pointer;
    }
    .room-btn:active { background: #DDE7F7; border-color: #143778; }
    .room-btn:disabled { opacity: .5; }
  </style>
</head>
<body>
  <div id="message"></div>
  <div id="picker">
    <h1>在籍している教室を選択してください</h1>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    // ===== 設定 =====
    const LIFF_ID = '2010272855-LUwv7nxh';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbywAFTtPxH5dU4TVnBvXhbjQy10z7cqwWUS4P7q9bg6crE_v8Sfmz117cYfIWRtb7Cpgw/exec';
    // 即描画用フォールバック。最新はGASのgetConfigから取得して差し替える。
    const DEFAULT_CLASSROOMS = ['稲毛', '妙典', '西千葉', '都賀', '新検見川', '稲毛海岸', '蘇我', '五井', '四街道', '鎌取'];
    // ================

    let userId = null;
    let userIdReady = null; // liff.initでuserIdを取得する非同期処理（登録時に待つ）
    let submitting = false;

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.className = 'message ' + type;
      el.textContent = text;
    }

    function renderButtons(classrooms) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      classrooms.forEach(function (name) {
        const btn = document.createElement('button');
        btn.className = 'room-btn';
        btn.textContent = name;
        btn.addEventListener('click', function () { register(name, btn); });
        grid.appendChild(btn);
      });
    }

    // GASから教室一覧を取得（JSONP。別オリジンのためscriptタグで読む）
    function fetchClassroomsJsonp() {
      return new Promise(function (resolve) {
        const cb = 'jsonp_' + Date.now();
        const script = document.createElement('script');
        const timer = setTimeout(function () { cleanup(); resolve(null); }, 8000);
        function cleanup() {
          clearTimeout(timer);
          delete window[cb];
          if (script.parentNode) script.parentNode.removeChild(script);
        }
        window[cb] = function (data) {
          cleanup();
          resolve(data && data.classrooms && data.classrooms.length ? data.classrooms : null);
        };
        script.onerror = function () { cleanup(); resolve(null); };
        script.src = GAS_URL + '?action=getConfig&callback=' + cb;
        document.body.appendChild(script);
      });
    }

    async function register(classroom, btn) {
      if (submitting) return;
      submitting = true;
      Array.prototype.forEach.call(document.querySelectorAll('.room-btn'), function (b) { b.disabled = true; });
      btn.textContent = classroom + '（登録中…）';

      try {
        // userIdは裏で取得中。まだなら待ってから送信する。
        await userIdReady;
        if (!userId) {
          throw new Error('ユーザー情報を取得できませんでした。一度閉じて開き直してください。');
        }
        // GASは別オリジンのためCORSでレスポンスを読めない。no-corsで送信し、
        // 確認はGASからのLINEプッシュメッセージで通知される。
        await fetch(GAS_URL + '?action=register_classroom', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ userId: userId, classroom: classroom }),
        });
        if (liff.isInClient()) {
          liff.closeWindow();
        } else {
          showMessage(classroom + '教室で登録しました。', 'error');
        }
      } catch (err) {
        showMessage('登録に失敗しました: ' + err.message, 'error');
        submitting = false;
        Array.prototype.forEach.call(document.querySelectorAll('.room-btn'), function (b) { b.disabled = false; });
        btn.textContent = classroom;
      }
    }

    function main() {
      // 初期値で即描画し、見出しとボタンを同時に出す
      renderButtons(DEFAULT_CLASSROOMS);
      document.getElementById('picker').style.visibility = 'visible';

      // 裏で最新の教室一覧を取得し、変わっていれば描き直す（登録操作中は触らない）
      fetchClassroomsJsonp().then(function (latest) {
        if (latest && !submitting && JSON.stringify(latest) !== JSON.stringify(DEFAULT_CLASSROOMS)) {
          renderButtons(latest);
        }
      });

      // userIdは裏で並行取得。登録(タップ)時に userIdReady を待つ。
      userIdReady = (async function () {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }
          const profile = await liff.getProfile();
          userId = profile.userId;
        } catch (err) {
          showMessage('ユーザー情報の取得に失敗しました: ' + err.message, 'error');
        }
      })();
    }

    main();
  </script>
</body>
</html>
