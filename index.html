<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>欠席連絡</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #F2F4F7;
      padding: 16px;
      color: #333333;
    }
    .classroom-display {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #eeeeee;
      color: #333333;
      font-size: 16px;
    }
    .form-group {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 17px;
      color: #143778;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input[type="text"], input[type="date"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      background: #fff;
      color: #333333;
      appearance: none;
    }
    .field-error {
      color: #c62828;
      font-size: 13px;
      font-weight: bold;
      margin-left: 6px;
    }
    input.invalid, textarea.invalid {
      border-color: #c62828;
      background: #fff6f6;
    }
    .period-grid.invalid .period-item {
      border-color: #c62828;
    }
    .period-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .period-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      background: white;
    }
    .period-item.selected {
      border-color: #143778;
      background: #DDE7F7;
    }
    .period-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #143778;
    }
    .period-label { font-size: 15px; }
    .period-time { font-size: 12px; color: #888; }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #E67832;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .submit-btn:disabled { background: #aaa; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 15px; white-space: pre-line; }
    .message.error { background: #fdecea; color: #c62828; }
    .message.success { background: #D7ECDD; color: #1e6b3a; }
  </style>
</head>
<body>
  <div id="message"></div>

  <form id="absenceForm" novalidate>
    <div class="form-group">
      <label>教室名</label>
      <div class="classroom-display" id="classroomDisplay">-</div>
    </div>

    <div class="form-group">
      <label for="studentName">生徒名 <span class="field-error" id="err-studentName"></span></label>
      <input type="text" id="studentName" placeholder="例：山田 太郎" required>
    </div>

    <div class="form-group">
      <label for="absenceDate">欠席日 <span class="field-error" id="err-absenceDate"></span></label>
      <input type="date" id="absenceDate" required>
    </div>

    <div class="form-group">
      <label>時限（複数選択可） <span class="field-error" id="err-periodGrid"></span></label>
      <div class="period-grid" id="periodGrid"></div>
    </div>

    <div class="form-group">
      <label for="reason">理由 <span class="field-error" id="err-reason"></span></label>
      <textarea id="reason" rows="3" placeholder="例：発熱のため" required></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">送信する</button>
  </form>

  <script>
    // ===== 設定（環境に合わせて変更）=====
    const LIFF_ID = '2010272855-O3sIeywy';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbywAFTtPxH5dU4TVnBvXhbjQy10z7cqwWUS4P7q9bg6crE_v8Sfmz117cYfIWRtb7Cpgw/exec';
    const PERIODS = [
      { label: '2限', time: '14:00〜' },
      { label: '3限', time: '15:00〜' },
      { label: '4限', time: '16:00〜' },
      { label: '5限', time: '17:00〜' },
      { label: '6限', time: '18:00〜' },
      { label: '7限', time: '19:00〜' },
      { label: '8限', time: '20:00〜' },
      { label: '9限', time: '21:00〜' },
    ];
    // =====================================

    let userId = null;
    let classroomName = '';

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.className = 'message ' + type;
      el.textContent = text;
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 各項目のタイトル横に警告を表示し、入力枠を赤くする
    function setFieldError(id, message) {
      const err = document.getElementById('err-' + id);
      if (err) err.textContent = '※' + message;
      const el = document.getElementById(id);
      if (el) el.classList.add('invalid');
    }

    function clearFieldError(id) {
      const err = document.getElementById('err-' + id);
      if (err) err.textContent = '';
      const el = document.getElementById(id);
      if (el) el.classList.remove('invalid');
    }

    function clearAllFieldErrors() {
      ['studentName', 'absenceDate', 'periodGrid', 'reason'].forEach(clearFieldError);
    }

    function buildPeriodGrid() {
      const grid = document.getElementById('periodGrid');
      PERIODS.forEach(p => {
        const item = document.createElement('div');
        item.className = 'period-item';
        item.innerHTML =
          '<input type="checkbox" id="p_' + p.label + '" value="' + p.label + '(' + p.time + ')">' +
          '<div><div class="period-label">' + p.label + '</div>' +
          '<div class="period-time">' + p.time + '</div></div>';
        item.addEventListener('click', function(e) {
          const cb = this.querySelector('input');
          if (e.target !== cb) cb.checked = !cb.checked;
          this.classList.toggle('selected', cb.checked);
          clearFieldError('periodGrid');
        });
        grid.appendChild(item);
      });
    }

    // GASからuserIdで教室名を取得（JSONP。別オリジンのためscriptタグで読む）
    function fetchClassroom(uid) {
      return new Promise(function(resolve) {
        const cb = 'jsonp_' + Date.now();
        const script = document.createElement('script');
        const timer = setTimeout(function() { cleanup(); resolve(null); }, 8000);
        function cleanup() {
          clearTimeout(timer);
          delete window[cb];
          if (script.parentNode) script.parentNode.removeChild(script);
        }
        window[cb] = function(data) {
          cleanup();
          resolve(data && data.classroom ? data.classroom : null);
        };
        script.onerror = function() { cleanup(); resolve(null); };
        script.src = GAS_URL + '?action=getClassroom&userId=' + encodeURIComponent(uid) + '&callback=' + cb;
        document.body.appendChild(script);
      });
    }

    function setTodayAsDefault() {
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, '0');
      const d = String(today.getDate()).padStart(2, '0');
      document.getElementById('absenceDate').value = y + '-' + m + '-' + d;
    }

    document.getElementById('absenceForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      clearAllFieldErrors();

      if (!userId) {
        showMessage('ユーザー情報を取得できませんでした。一度閉じて開き直してください。', 'error');
        return;
      }

      const studentName = document.getElementById('studentName').value.trim();
      const absenceDate = document.getElementById('absenceDate').value;
      const reason = document.getElementById('reason').value.trim();
      const periods = Array.from(document.querySelectorAll('#periodGrid input:checked'))
        .map(cb => cb.value);

      let firstInvalid = null;
      if (!studentName) { setFieldError('studentName', '入力してください'); firstInvalid = firstInvalid || 'studentName'; }
      if (!absenceDate) { setFieldError('absenceDate', '選択してください'); firstInvalid = firstInvalid || 'absenceDate'; }
      if (periods.length === 0) { setFieldError('periodGrid', '1つ以上選択してください'); firstInvalid = firstInvalid || 'periodGrid'; }
      if (!reason) { setFieldError('reason', '入力してください'); firstInvalid = firstInvalid || 'reason'; }
      if (firstInvalid) {
        document.getElementById(firstInvalid).scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      btn.disabled = true;
      btn.textContent = '送信中...';

      const payload = {
        userId: userId,
        classroom: classroomName,
        studentName: studentName,
        absenceDate: absenceDate,
        periods: periods,
        reason: reason,
      };

      try {
        // GASは別オリジンのためCORSでレスポンスを読めない。no-corsで送信し、
        // 受付確認はGASからのLINEプッシュメッセージで通知される。
        await fetch(GAS_URL + '?action=absence', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload),
        });
        document.getElementById('absenceForm').style.display = 'none';
        showMessage('✅ 欠席連絡を送信しました。\nLINEに確認メッセージが届きます。\nこの画面は自動で閉じます。', 'success');
        window.scrollTo(0, 0);
        setTimeout(function() {
          if (liff.isInClient()) {
            liff.closeWindow();
          }
        }, 1500);
      } catch (err) {
        showMessage('送信に失敗しました: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = '送信する';
      }
    });

    async function main() {
      buildPeriodGrid();
      setTodayAsDefault();

      try {
        await liff.init({ liffId: LIFF_ID });
      } catch (err) {
        showMessage('LIFFの初期化に失敗しました: ' + err.message, 'error');
        return;
      }

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      try {
        const profile = await liff.getProfile();
        userId = profile.userId;
      } catch (err) {
        showMessage('ユーザー情報の取得に失敗しました: ' + err.message, 'error');
        return;
      }

      // 教室名を決定：URLパラメータ優先、なければuserIdからGASに問い合わせ
      classroomName = new URLSearchParams(location.search).get('classroom') || '';
      if (!classroomName) {
        classroomName = await fetchClassroom(userId) || '';
      }
      if (classroomName) {
        document.getElementById('classroomDisplay').textContent = classroomName;
      } else {
        document.getElementById('classroomDisplay').textContent = '未登録';
        showMessage('教室が未登録です。LINEのメニューから教室登録を行ってください。', 'error');
      }
    }

    ['studentName', 'absenceDate', 'reason'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() { clearFieldError(id); });
    });

    main();
  </script>
</body>
</html>
